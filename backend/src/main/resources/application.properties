spring.application.name=queryflow-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/queryflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

# QueryFlow Dataset Config
queryflow.dataset.load-on-startup=${LOAD_ON_STARTUP:true}
queryflow.dataset.path=${DATASET_PATH:data/search_queries.csv}

# Distributed Redis Nodes Config
redis.nodes.node1.host=${REDIS_NODE1_HOST:localhost}
redis.nodes.node1.port=${REDIS_NODE1_PORT:6379}
redis.nodes.node2.host=${REDIS_NODE2_HOST:localhost}
redis.nodes.node2.port=${REDIS_NODE2_PORT:6380}
redis.nodes.node3.host=${REDIS_NODE3_HOST:localhost}
redis.nodes.node3.port=${REDIS_NODE3_PORT:6381}


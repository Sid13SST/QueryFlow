spring.application.name=queryflow-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/queryflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

# QueryFlow Dataset Config
queryflow.dataset.load-on-startup=${LOAD_ON_STARTUP:true}
queryflow.dataset.path=${DATASET_PATH:data/search_queries.csv}

# Redis Config
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

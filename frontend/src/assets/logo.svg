  <circle cx="95" cy="120" r="28" stroke="#ffffff" stroke-width="6" stroke-opacity="0.85" />
  <path d="M115 140 L 135 160" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-opacity="0.9" />
  <circle cx="175" cy="90" r="4" fill="#10b981" />
